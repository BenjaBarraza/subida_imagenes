{% extends 'base.html' %}

{% block title %}Panel de Control | Pro{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8 text-center md:text-left">
        <h1 class="text-3xl font-bold text-white uppercase tracking-tighter">Gestión de Medios</h1>
        <p class="text-slate-500 text-sm font-medium">Sincronización directa con el servidor de activos</p>
    </div>

    <div class="glass-card p-6 md:p-10 relative overflow-hidden border-indigo-500/20 shadow-2xl shadow-indigo-500/5">
        <canvas id="uploadCanvas" class="absolute inset-0 pointer-events-none opacity-30"></canvas>
        
        <form method="POST" enctype="multipart/form-data" class="space-y-8 relative z-10" id="uploadForm">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-black mb-3 text-slate-500 uppercase tracking-[0.3em]">Título de foto</label>
                <input type="text" name="title" placeholder="Ej: UI Design" 
                       class="input-dark w-full bg-slate-950/50 border border-slate-800 p-4 rounded-2xl text-white outline-none focus:border-indigo-500 transition-all">
            </div>
            
            <div class="flex flex-col md:flex-row gap-6 items-center bg-slate-950/30 p-6 rounded-3xl border border-slate-800/50">
                <div class="w-full">
                    <input type="file" id="imageInput" name="image_file" required 
                           onchange="previewImage(event)"
                           class="block w-full text-sm text-slate-500 
                                  file:mr-6 file:py-3 file:px-6 
                                  file:rounded-full file:border-0 
                                  file:bg-indigo-600 file:text-white 
                                  file:font-bold file:text-xs file:uppercase file:tracking-widest
                                  hover:file:bg-indigo-500 transition-all cursor-pointer">
                </div>
                
                <div id="previewContainer" class="hidden shrink-0">
                    <div class="relative w-28 h-28 rounded-2xl overflow-hidden border-2 border-indigo-500 shadow-xl shadow-indigo-500/20">
                        <img id="instantPreview" src="" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-indigo w-full bg-indigo-600 hover:bg-indigo-500 border-none uppercase tracking-[0.4em] font-black py-5 rounded-2xl transition-all active:scale-[0.98] shadow-lg shadow-indigo-600/20">
                Subir foto
            </button>
        </form>
    </div>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const output = document.getElementById('instantPreview');
            output.src = reader.result;
            document.getElementById('previewContainer').classList.remove('hidden');
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
{% endblock %}
