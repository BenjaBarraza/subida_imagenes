{% extends 'base.html' %}

{% block title %}Panel de Control | Pro{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-2 md:px-0">
    <div class="mb-10 text-center">
        <h1 class="text-3xl md:text-4xl font-black text-white uppercase tracking-tighter">Gestión de Medios</h1>
        <p class="text-slate-500 text-xs md:text-sm font-medium tracking-wide">Sincronización directa con el servidor de activos</p>
    </div>

    <div class="glass-card p-5 md:p-10 relative overflow-hidden border-indigo-500/20 shadow-2xl">
        <canvas id="uploadCanvas" class="absolute inset-0 pointer-events-none opacity-20"></canvas>
        
        <form method="POST" enctype="multipart/form-data" class="space-y-8 relative z-10" id="uploadForm">
            {% csrf_token %}
            
            <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] ml-1">Título de foto</label>
                <input type="text" name="title" placeholder="Ej: UI Design" 
                       class="w-full bg-slate-950/50 border border-slate-800 p-4 rounded-2xl text-white outline-none focus:border-indigo-500 transition-all text-sm">
            </div>
            
            <div class="flex flex-col md:flex-row gap-6 items-center bg-slate-950/30 p-5 rounded-3xl border border-slate-800/50">
                <div class="w-full relative">
                    <input type="file" id="imageInput" name="image_file" required 
                           onchange="previewImage(event)"
                           class="block w-full text-xs text-slate-500 
                                  file:mr-4 file:py-2.5 file:px-5 
                                  file:rounded-full file:border-0 
                                  file:bg-indigo-600 file:text-white 
                                  file:font-bold file:text-[10px] file:uppercase file:tracking-widest
                                  hover:file:bg-indigo-500 transition-all cursor-pointer">
                </div>
                
                <div id="previewContainer" class="hidden shrink-0">
                    <div class="relative w-24 h-24 md:w-28 md:h-28 rounded-2xl overflow-hidden border-2 border-indigo-500 shadow-xl shadow-indigo-500/20 mx-auto">
                        <img id="instantPreview" src="" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 md:py-5 rounded-2xl border-none uppercase tracking-[0.3em] text-xs md:text-sm shadow-lg shadow-indigo-600/20 transition-all active:scale-[0.98]">
                Subir foto
            </button>
        </form>
    </div>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const output = document.getElementById('instantPreview');
            output.src = reader.result;
            document.getElementById('previewContainer').classList.remove('hidden');
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
{% endblock %}
