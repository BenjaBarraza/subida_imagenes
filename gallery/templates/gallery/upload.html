{% extends 'base.html' %}

{% block title %}Panel de Control | Pro{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-bold text-white">Gestión de Medios</h1>
            <p class="text-slate-500 text-sm">Tienes <span class="text-indigo-400 font-bold">{{ photos.count }}</span> imágenes almacenadas</p>
        </div>
    </div>

    <div class="glass-card p-6 md:p-8 mb-10 relative overflow-hidden">
        <canvas id="uploadCanvas" class="absolute inset-0 pointer-events-none opacity-50"></canvas>
        
        <form method="POST" enctype="multipart/form-data" class="space-y-6 relative z-10" id="uploadForm">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-2 text-slate-400">Nombre del Proyecto</label>
                <input type="text" name="title" placeholder="Ej: UI Design" class="input-dark">
            </div>
            
            <div class="flex flex-col md:flex-row gap-6 items-center">
                <div class="w-full">
                    <input type="file" id="imageInput" name="image_file" required 
                           onchange="previewImage(event)"
                           class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-900 file:text-indigo-200 hover:file:bg-indigo-800 cursor-pointer">
                </div>
                <div id="previewContainer" class="hidden shrink-0">
                    <div class="relative w-32 h-32 rounded-2xl overflow-hidden border-2 border-indigo-500 shadow-lg">
                        <img id="instantPreview" src="" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-indigo w-full bg-indigo-600 hover:bg-indigo-500 border-none uppercase tracking-widest py-4 transition-all">
                Sincronizar con Servidor
            </button>
        </form>
    </div>

    <div class="glass-card overflow-hidden">
        <table class="w-full text-left">
            <tbody class="divide-y divide-slate-800">
                {% for photo in photos %}
                <tr class="hover:bg-slate-800/40 transition-colors group">
                    <td class="p-4 w-20"><img src="{{ photo.image.url }}" class="w-12 h-12 object-cover rounded-lg"></td>
                    <td class="p-4 font-medium text-slate-300">{{ photo.title|default:"Snapshot" }}</td>
                    <td class="p-4 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                        <a href="{% url 'delete_photo' photo.pk %}" class="text-red-500 font-bold hover:bg-red-500/10 px-3 py-1 rounded-md">Borrar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
