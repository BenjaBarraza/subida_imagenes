{% extends 'base.html' %}

{% block title %}Galería Pública{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-16">
    <h1 class="text-5xl font-black tracking-tighter italic text-indigo-500">MIS FOTOS</h1>
    <a href="{% url 'upload_panel' %}" class="text-sm font-bold text-slate-500 hover:text-white uppercase tracking-widest border-b border-slate-800 pb-1">Admin Panel</a>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-6">
    {% for photo in photos %}
    <div class="glass-card aspect-square overflow-hidden group cursor-pointer relative" onclick="openPop('{{ photo.image.url }}')">
        <img src="{{ photo.image.url }}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500 opacity-80 group-hover:opacity-100">
        <div class="absolute inset-0 bg-indigo-600/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white font-bold">Ver Grande</div>
    </div>
    {% endfor %}
</div>

<div id="popUp" class="fixed inset-0 bg-slate-950/95 z-50 hidden flex flex-col items-center justify-center p-4 backdrop-blur-sm" onclick="closePop()">
    <div class="relative max-h-[80vh] flex flex-col items-center" onclick="event.stopPropagation()">
        <img id="popImage" src="" class="max-h-full max-w-full rounded-2xl shadow-2xl border border-slate-800 scale-95 animate-in fade-in zoom-in duration-300 mb-4">
        
        <div class="flex gap-4">
            <a id="downloadBtn" href="" download class="btn-indigo bg-emerald-600 hover:bg-emerald-700 text-sm">Descargar Imagen</a>
            <button onclick="closePop()" class="btn-indigo bg-slate-700 hover:bg-slate-600 text-sm">Cerrar</button>
        </div>
    </div>
</div>
{% endblock %}
