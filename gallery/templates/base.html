{% load static %}
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Galería{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617 !important;
            color: #f1f5f9 !important;
            min-height: 100vh;
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
        .glass-card {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-dark {
            width: 100%;
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 0.75rem;
            border-radius: 0.75rem;
            color: white;
            outline: none;
        }
        .btn-indigo {
            background-color: #4f46e5;
            color: white;
            font-weight: bold;
            padding: 0.6rem 1.5rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }
        .btn-indigo:hover { background-color: #4338ca; transform: scale(1.02); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-lg border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                
                <a href="{% url 'accounts:login' %}" class="text-2xl font-black text-white tracking-tighter italic transition-transform hover:scale-105">
                    MI<span class="text-indigo-500">GALERÍA</span>
                </a>

                <div class="flex items-center space-x-6">
                    {% if user.is_authenticated %}
                        <a href="{% url 'gallery_index' %}" class="text-sm font-bold text-slate-300 hover:text-white transition-colors">Panel</a>
                        <a href="#" class="text-sm font-bold text-slate-300 hover:text-white transition-colors">Mi Perfil</a>
                        
                        
                        <div class="h-5 w-px bg-slate-700"></div> 
                        
                        <form method="post" action="{% url 'accounts:logout' %}" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="text-sm font-black text-red-500 hover:text-red-400 tracking-widest uppercase transition-colors">
                                Salir
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'accounts:login' %}" class="text-sm font-bold text-slate-300 hover:text-white transition-colors">Entrar</a>
                        <a href="{% url 'accounts:register' %}" class="btn-indigo bg-indigo-600 hover:bg-indigo-500 text-sm py-2 px-5 rounded-lg">
                            Registrarse
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'gallery/js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
